<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우산을 가지고 온 날은 왜 하필 비가 안올까?</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            transition: background 1.5s ease;
            background: #1a1a2e;
            cursor: pointer;
        }

        body.sunny {
            background: #87CEEB;
        }

        #rain-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 2;
            transition: opacity 1s ease;
        }

        body.sunny #rain-canvas { opacity: 0; }

        .dark-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.3);
            z-index: 1;
            transition: opacity 1.5s ease;
        }

        body.sunny .dark-overlay { opacity: 0; }

        /* Three.js 태양 컨테이너 */
        #sun-container {
            position: fixed;
            top: -300px;
            right: 5%;
            width: 250px;
            height: 250px;
            z-index: 3;
            transition: top 1.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        body.sunny #sun-container {
            top: 20px;
        }

        #sun-container canvas {
            width: 100% !important;
            height: 100% !important;
        }

        /* 우산 */
        .umbrella-wrapper {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 5;
            cursor: pointer;
        }

        .umbrella-closed {
            width: 8px;
            height: 200px;
            background: #333;
            border-radius: 4px;
            position: relative;
            margin: 0 auto;
        }

        .umbrella-closed .tip {
            position: absolute;
            bottom: -20px; left: 50%;
            transform: translateX(-50%);
            width: 20px; height: 20px;
            border: 4px solid #333;
            border-radius: 50%;
            border-top: none;
        }

        .umbrella-closed .top-ball {
            position: absolute;
            top: -10px; left: 50%;
            transform: translateX(-50%);
            width: 16px; height: 16px;
            background: #c0392b;
            border-radius: 50%;
        }

        .umbrella-open {
            display: none;
            text-align: center;
        }

        .umbrella-open .canopy {
            width: 200px; height: 100px;
            background: #c0392b;
            border-radius: 200px 200px 0 0;
            position: relative;
            margin: 0 auto;
            overflow: hidden;
        }

        .umbrella-open .canopy::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: repeating-conic-gradient(
                #c0392b 0deg 45deg, #a93226 45deg 90deg
            );
            border-radius: 200px 200px 0 0;
            opacity: 0.4;
        }

        .umbrella-open .stick {
            width: 6px; height: 140px;
            background: #333;
            margin: 0 auto;
            border-radius: 3px;
        }

        .umbrella-open .hook {
            width: 24px; height: 24px;
            border: 5px solid #333;
            border-radius: 50%;
            border-top: none; border-left: none;
            margin: -5px auto 0;
            transform: rotate(45deg);
        }

        body.sunny .umbrella-open {
            display: block;
            animation: pop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        body.sunny .umbrella-closed { display: none; }

        @keyframes pop {
            0% { transform: scale(0.3) rotate(-10deg); opacity: 0; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        .hint {
            position: fixed;
            bottom: 40px; left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
            z-index: 10;
            transition: opacity 1s ease;
            letter-spacing: 1px;
        }

        body.sunny .hint { opacity: 0; }
    </style>
</head>
<body>
    <canvas id="rain-canvas"></canvas>
    <div class="dark-overlay"></div>

    <!-- Three.js 태양 -->
    <div id="sun-container"></div>

    <!-- 우산 -->
    <div class="umbrella-wrapper" id="umbrella-trigger">
        <div class="umbrella">
            <div class="umbrella-closed">
                <div class="top-ball"></div>
                <div class="tip"></div>
            </div>
            <div class="umbrella-open">
                <div class="canopy"></div>
                <div class="stick"></div>
                <div class="hook"></div>
            </div>
        </div>
    </div>

    <div class="hint">우산을 클릭해보세요</div>

    <!-- Three.js CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // === PS1 스타일 태양 (Three.js) ===
        const container = document.getElementById('sun-container');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(50, 1, 0.1, 100);
        camera.position.z = 3;

        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: false });
        renderer.setSize(250, 250);
        renderer.setPixelRatio(1); // 일부러 낮은 해상도
        container.appendChild(renderer.domElement);

        // 얼굴 텍스처 — canvas로 직접 그리기 (픽셀 깨지는 느낌)
        const faceCanvas = document.createElement('canvas');
        faceCanvas.width = 64;  // 의도적으로 낮은 해상도
        faceCanvas.height = 64;
        const fctx = faceCanvas.getContext('2d');

        // 배경 — 노란색
        fctx.fillStyle = '#FFB800';
        fctx.fillRect(0, 0, 64, 64);

        // 눈 — 크고 불안한 눈
        fctx.fillStyle = '#000';
        fctx.fillRect(18, 20, 8, 10);
        fctx.fillRect(38, 20, 8, 10);

        // 눈 하이라이트
        fctx.fillStyle = '#fff';
        fctx.fillRect(20, 22, 4, 4);
        fctx.fillRect(40, 22, 4, 4);

        // 코
        fctx.fillStyle = '#E8960C';
        fctx.fillRect(30, 32, 5, 5);

        // 입 — 불편한 미소
        fctx.fillStyle = '#000';
        fctx.fillRect(20, 42, 24, 3);
        fctx.fillRect(18, 40, 3, 3);
        fctx.fillRect(43, 40, 3, 3);
        // 이빨
        fctx.fillStyle = '#fff';
        fctx.fillRect(24, 42, 4, 3);
        fctx.fillRect(30, 42, 4, 3);
        fctx.fillRect(36, 42, 4, 3);

        // 볼터치
        fctx.fillStyle = 'rgba(255, 100, 100, 0.5)';
        fctx.fillRect(12, 34, 6, 4);
        fctx.fillRect(46, 34, 6, 4);

        const texture = new THREE.CanvasTexture(faceCanvas);
        texture.magFilter = THREE.NearestFilter; // 픽셀 깨지게
        texture.minFilter = THREE.NearestFilter;

        // 로우폴리 구체
        const geometry = new THREE.SphereGeometry(1, 8, 6); // 일부러 면 수 적게
        const material = new THREE.MeshBasicMaterial({
            map: texture,
            flatShading: true
        });
        // flatShading은 MeshStandardMaterial에서만 동작하므로 별도 처리
        const sunMesh = new THREE.Mesh(geometry, material);
        scene.add(sunMesh);

        // 버텍스 지터 (PS1 특유의 흔들림)
        const originalPositions = geometry.attributes.position.array.slice();

        let sunTime = 0;
        function animateSun() {
            requestAnimationFrame(animateSun);
            sunTime += 0.02;

            sunMesh.rotation.y += 0.008;

            // PS1 버텍스 지터
            const positions = geometry.attributes.position.array;
            for (let i = 0; i < positions.length; i += 3) {
                positions[i] = originalPositions[i] + (Math.random() - 0.5) * 0.02;
                positions[i + 1] = originalPositions[i + 1] + (Math.random() - 0.5) * 0.02;
                positions[i + 2] = originalPositions[i + 2] + (Math.random() - 0.5) * 0.02;
            }
            geometry.attributes.position.needsUpdate = true;

            renderer.render(scene, camera);
        }
        animateSun();

        // === 비 애니메이션 ===
        const rainCanvas = document.getElementById('rain-canvas');
        const ctx = rainCanvas.getContext('2d');
        let w = rainCanvas.width = window.innerWidth;
        let h = rainCanvas.height = window.innerHeight;
        let isRaining = true;

        window.addEventListener('resize', () => {
            w = rainCanvas.width = window.innerWidth;
            h = rainCanvas.height = window.innerHeight;
        });

        class Raindrop {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * w;
                this.y = Math.random() * -h;
                this.speed = Math.random() * 15 + 10;
                this.length = Math.random() * 25 + 15;
                this.opacity = Math.random() * 0.4 + 0.2;
            }
            update() {
                this.y += this.speed;
                if (this.y > h) this.reset();
            }
            draw() {
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(this.x + 1, this.y + this.length);
                ctx.strokeStyle = `rgba(174, 194, 224, ${this.opacity})`;
                ctx.lineWidth = 1.5;
                ctx.stroke();
            }
        }

        const drops = Array.from({ length: 200 }, () => new Raindrop());

        function animateRain() {
            if (!isRaining) { ctx.clearRect(0, 0, w, h); }
            else {
                ctx.clearRect(0, 0, w, h);
                for (const drop of drops) { drop.update(); drop.draw(); }
            }
            requestAnimationFrame(animateRain);
        }
        animateRain();

        // === 우산 클릭 ===
        const trigger = document.getElementById('umbrella-trigger');
        let opened = false;

        trigger.addEventListener('click', (e) => {
            e.stopPropagation();
            if (opened) return;
            opened = true;
            isRaining = false;
            document.body.classList.add('sunny');
        });

        document.body.addEventListener('click', () => {
            if (!opened) return;
            opened = false;
            isRaining = true;
            document.body.classList.remove('sunny');
        });
    </script>
</body>
</html>
