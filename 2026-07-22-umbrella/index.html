<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우산을 가지고 온 날은 왜 하필 비가 안올까?</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            overflow: hidden;
            background: #1a1a2e;
            cursor: pointer;
            transition: background 1.5s ease;
        }
        body.sunny { background: #5bafeb; }

        #main-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
        }

        .hint {
            position: fixed;
            bottom: 40px; left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.5);
            font-size: 14px;
            font-family: -apple-system, sans-serif;
            z-index: 10;
            transition: opacity 1s ease;
            letter-spacing: 1px;
        }
        body.sunny .hint { opacity: 0; }

        /* 크레딧 — CC-BY-4.0 */
        .credit {
            position: fixed;
            bottom: 10px; right: 10px;
            color: rgba(255,255,255,0.3);
            font-size: 10px;
            font-family: sans-serif;
            z-index: 10;
        }
        .credit a { color: rgba(255,255,255,0.4); }

        /* 따라다니는 글자들 */
        .trail-text {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 20;
        }
        .trail-char {
            position: absolute;
            font-size: 72px;
            font-weight: bold;
            white-space: nowrap;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Jua&family=Do+Hyeon&family=Gothic+A1:wght@900&family=Nanum+Pen+Script&family=Gaegu:wght@700&family=Hi+Melody&family=Dokdo&family=Gugi&family=Gamja+Flower&family=Cute+Font&family=Sunflower:wght@700&family=Poor+Story&family=Nanum+Gothic:wght@800" display=swap rel="stylesheet">
</head>
<body>
    <canvas id="main-canvas"></canvas>
    <div class="trail-text" id="trail-text"></div>
    <div class="hint">우산을 클릭해보세요</div>
    <div class="credit">Umbrella model by <a href="https://sketchfab.com/rbkavin" target="_blank">rbkavin</a> (CC-BY-4.0)</div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    const canvas = document.getElementById('main-canvas');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 0.8, 3.5);
    camera.lookAt(0, 0.8, 0);

    window.addEventListener('resize', () => {
        renderer.setSize(window.innerWidth, window.innerHeight);
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
    });

    // === 조명 ===
    const ambientLight = new THREE.AmbientLight(0x404060, 1.0);
    scene.add(ambientLight);
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(3, 5, 4);
    scene.add(dirLight);
    const fillLight = new THREE.DirectionalLight(0x8888ff, 0.3);
    fillLight.position.set(-2, 1, -1);
    scene.add(fillLight);

    // === 비 파티클 ===
    const rainCount = 3000;
    const rainGeo = new THREE.BufferGeometry();
    const rainPositions = new Float32Array(rainCount * 3);
    const rainVelocities = new Float32Array(rainCount);

    for (let i = 0; i < rainCount; i++) {
        rainPositions[i * 3] = (Math.random() - 0.5) * 20;
        rainPositions[i * 3 + 1] = Math.random() * 15 - 5;
        rainPositions[i * 3 + 2] = (Math.random() - 0.5) * 10;
        rainVelocities[i] = Math.random() * 0.2 + 0.15;
    }
    rainGeo.setAttribute('position', new THREE.BufferAttribute(rainPositions, 3));
    const rainMat = new THREE.PointsMaterial({ color: 0xaaccee, size: 0.05, transparent: true, opacity: 0.6 });
    const rain = new THREE.Points(rainGeo, rainMat);
    scene.add(rain);

    // === 우산 모델 로드 ===
    const loader = new GLTFLoader();
    let umbrellaGroup = new THREE.Group();
    let closedParts = [];
    let openParts = [];
    let modelLoaded = false;

    loader.load('./low_poly_umbrella_open_and_closed.glb', (gltf) => {
        const model = gltf.scene;

        // 메시 수집
        const meshes = [];
        model.traverse((child) => {
            if (child.isMesh) {
                child.material = child.material.clone();
                if (child.material.name.includes('handel')) {
                    child.material.color.set(0x3d2b1f);
                    child.material.roughness = 0.3;
                    child.material.metalness = 0.1;
                } else {
                    child.material.color.set(0xc0392b);
                    child.material.roughness = 0.6;
                }
                meshes.push(child);
            }
        });

        // 손잡이는 항상 보임 (meshes[0])
        // 캐노피만 교체: meshes[3] = 접힌 천, meshes[2] = 펼친 캐노피
        // meshes[1] = 열린 손잡이 → 안 씀

        // meshes[1], meshes[3] 안 씀
        meshes[1].visible = false;
        meshes[3].visible = false;

        // 손잡이(meshes[0]) 길이 늘리기 — 접힌 캐노피 밖으로 삐져나오게
        // mesh 직접 스케일이 안 먹을 수 있으니 parent에 적용
        if (meshes[0].parent) {
            meshes[0].parent.scale.set(1, 1.5, 1);
        } else {
            meshes[0].scale.set(1, 1.5, 1);
        }

        // meshes[2] = 펼친 캐노피 — 초기에 숨김
        meshes[2].visible = false;
        openParts.push(meshes[2]);

        // 접힌 천: 위가 뾰족, 아래가 약간 두꺼운 형태 (접힌 장우산)
        const closedGeo = new THREE.CylinderGeometry(0.03, 0.12, 2.16, 12);
        const closedMat = new THREE.MeshPhongMaterial({ color: 0xc0392b, roughness: 0.6 });
        const closedCone = new THREE.Mesh(closedGeo, closedMat);
        closedCone.position.set(0, 0.64, 0);
        umbrellaGroup.add(closedCone);
        closedParts.push(closedCone);

        umbrellaGroup.add(model);
        umbrellaGroup.scale.set(1.0, 1.0, 1.0);
        umbrellaGroup.position.set(0, 0, 0);
        scene.add(umbrellaGroup);
        modelLoaded = true;
    });

    // === 태양 (PS1 셰이더) ===
    const sunGroup = new THREE.Group();
    sunGroup.position.set(2.5, 7, -2);

    // 텍스처
    const faceCanvas = document.createElement('canvas');
    faceCanvas.width = 128;
    faceCanvas.height = 128;
    const fctx = faceCanvas.getContext('2d');

    fctx.fillStyle = '#FFB800';
    fctx.fillRect(0, 0, 128, 128);

    fctx.fillStyle = '#000';
    fctx.beginPath(); fctx.ellipse(42, 50, 10, 12, 0, 0, Math.PI * 2); fctx.fill();
    fctx.beginPath(); fctx.ellipse(86, 50, 10, 12, 0, 0, Math.PI * 2); fctx.fill();

    fctx.fillStyle = '#fff';
    fctx.beginPath(); fctx.arc(45, 46, 4, 0, Math.PI * 2); fctx.fill();
    fctx.beginPath(); fctx.arc(89, 46, 4, 0, Math.PI * 2); fctx.fill();

    fctx.fillStyle = '#E8960C';
    fctx.beginPath(); fctx.arc(64, 68, 5, 0, Math.PI * 2); fctx.fill();

    fctx.strokeStyle = '#000'; fctx.lineWidth = 4;
    fctx.beginPath(); fctx.arc(64, 78, 22, 0.1, Math.PI - 0.1); fctx.stroke();

    fctx.fillStyle = '#fff';
    fctx.fillRect(50, 82, 7, 8); fctx.fillRect(60, 82, 7, 8); fctx.fillRect(70, 82, 7, 8);
    fctx.strokeStyle = '#000'; fctx.lineWidth = 1;
    fctx.strokeRect(50, 82, 7, 8); fctx.strokeRect(60, 82, 7, 8); fctx.strokeRect(70, 82, 7, 8);

    fctx.fillStyle = 'rgba(255, 80, 80, 0.4)';
    fctx.beginPath(); fctx.ellipse(28, 70, 8, 5, 0, 0, Math.PI * 2); fctx.fill();
    fctx.beginPath(); fctx.ellipse(100, 70, 8, 5, 0, 0, Math.PI * 2); fctx.fill();

    const sunTexture = new THREE.CanvasTexture(faceCanvas);
    sunTexture.magFilter = THREE.NearestFilter;
    sunTexture.minFilter = THREE.NearestFilter;

    const sunVertShader = `
        uniform float time;
        varying vec2 vUv;
        void main() {
            vUv = uv;
            vec3 pos = position;
            float gridSize = 40.0;
            vec4 mvPos = modelViewMatrix * vec4(pos, 1.0);
            mvPos.xyz = floor(mvPos.xyz * gridSize) / gridSize;
            gl_Position = projectionMatrix * mvPos;
        }
    `;
    const sunFragShader = `
        uniform sampler2D faceTexture;
        uniform float time;
        varying vec2 vUv;
        void main() {
            vec2 uv = vUv;
            uv.x += sin(uv.y * 10.0 + time * 2.0) * 0.015;
            uv.y += cos(uv.x * 10.0 + time * 1.5) * 0.015;
            vec4 texColor = texture2D(faceTexture, uv);
            gl_FragColor = texColor;
        }
    `;

    const sunMaterial = new THREE.ShaderMaterial({
        uniforms: { faceTexture: { value: sunTexture }, time: { value: 0 } },
        vertexShader: sunVertShader,
        fragmentShader: sunFragShader
    });

    const sunGeo = new THREE.SphereGeometry(1.2, 10, 8);
    const sunMesh = new THREE.Mesh(sunGeo, sunMaterial);
    sunGroup.add(sunMesh);

    for (let i = 0; i < 12; i++) {
        const rayGeo = new THREE.ConeGeometry(0.15, 0.8, 4);
        const rayMat = new THREE.MeshBasicMaterial({ color: 0xFFB800 });
        const ray = new THREE.Mesh(rayGeo, rayMat);
        const angle = (Math.PI * 2 / 12) * i;
        ray.position.set(Math.cos(angle) * 1.6, Math.sin(angle) * 1.6, 0);
        ray.rotation.z = angle - Math.PI / 2;
        sunGroup.add(ray);
    }
    scene.add(sunGroup);

    // === 상태 & 인터랙션 ===
    let isOpen = false;
    let targetSunY = 7;
    let rainOpacity = 0.6;
    let time = 0;
    let mouseX = 0, mouseY = 0;

    document.addEventListener('mousemove', (e) => {
        mouseX = (e.clientX / window.innerWidth) * 2 - 1;
        mouseY = -(e.clientY / window.innerHeight) * 2 + 1;
    });

    const raycaster = new THREE.Raycaster();
    const clickVec = new THREE.Vector2();

    canvas.addEventListener('click', (e) => {
        if (!modelLoaded) return;

        clickVec.x = (e.clientX / window.innerWidth) * 2 - 1;
        clickVec.y = -(e.clientY / window.innerHeight) * 2 + 1;
        raycaster.setFromCamera(clickVec, camera);
        const hits = raycaster.intersectObjects(umbrellaGroup.children, true);

        if (hits.length > 0) {
            isOpen = !isOpen;
            if (isOpen) {
                closedParts.forEach(p => p.visible = false);
                openParts.forEach(p => p.visible = true);
                targetSunY = 2.8;
                rainOpacity = 0;
                document.body.classList.add('sunny');
                dirLight.color.set(0xfff4d6);
                dirLight.intensity = 1.5;
                ambientLight.intensity = 1.5;
            } else {
                closedParts.forEach(p => p.visible = true);
                openParts.forEach(p => p.visible = false);
                targetSunY = 7;
                rainOpacity = 0.6;
                document.body.classList.remove('sunny');
                dirLight.color.set(0xffffff);
                dirLight.intensity = 0.8;
                ambientLight.intensity = 1.0;
            }
        }
    });

    // === 따라다니는 글자 세팅 (병아리 트레일) ===
    const trailText = document.getElementById('trail-text');
    const text = '우산을가지고온날은왜비가안올까';
    const fonts = [
        'Black Han Sans', 'Jua', 'Do Hyeon', 'Gothic A1', 'Nanum Pen Script',
        'Gaegu', 'Hi Melody', 'Dokdo', 'Gugi', 'Gamja Flower',
        'Cute Font', 'Sunflower', 'Poor Story', 'Nanum Gothic'
    ];
    const trailChars = [];
    const charPositions = []; // 각 글자의 현재 위치

    text.split('').forEach((char, i) => {
        const span = document.createElement('span');
        span.classList.add('trail-char');
        span.textContent = char;
        span.style.fontFamily = `'${fonts[i % fonts.length]}', sans-serif`;
        trailText.appendChild(span);
        trailChars.push(span);
        charPositions.push({ x: window.innerWidth / 2, y: window.innerHeight / 2 });
    });

    // === 애니메이션 ===
    function animate() {
        requestAnimationFrame(animate);
        time += 0.016;

        // 우산 — 제자리에서 둥실둥실
        if (modelLoaded) {
            umbrellaGroup.rotation.x = Math.sin(time * 0.8) * 0.03;
            umbrellaGroup.rotation.z = Math.cos(time * 0.6) * 0.03;
            umbrellaGroup.position.y = Math.sin(time * 1.2) * 0.05;
        }

        // 태양 — 마우스를 정확히 따라다님
        const targetSunX = mouseX * 3.0;
        const targetSunYMouse = targetSunY + mouseY * 2.0;
        sunGroup.position.y += (targetSunYMouse - sunGroup.position.y) * 0.05;
        sunGroup.position.x += (targetSunX - sunGroup.position.x) * 0.05;
        sunMesh.rotation.y += 0.006;
        sunMaterial.uniforms.time.value = time;

        // 태양 화면 좌표 → 글자 트레일
        const sunScreenPos = sunGroup.position.clone().project(camera);
        const sx = (sunScreenPos.x * 0.5 + 0.5) * window.innerWidth;
        const sy = (-sunScreenPos.y * 0.5 + 0.5) * window.innerHeight;

        // 각 글자가 앞 글자를 쫓아감 — 뒤로 갈수록 느리게 (감쇠)
        trailChars.forEach((ch, i) => {
            // 리더 위치: 첫 글자는 태양, 나머지는 앞 글자
            const leaderX = i === 0 ? sx : charPositions[i - 1].x;
            const leaderY = i === 0 ? (sy + 80) : charPositions[i - 1].y;

            // 속도: 앞 글자일수록 빠르게, 뒤로 갈수록 느리게
            const speed = 0.12 - (i * 0.006);
            const clampedSpeed = Math.max(speed, 0.02);

            charPositions[i].x += (leaderX - charPositions[i].x) * clampedSpeed;
            charPositions[i].y += (leaderY - charPositions[i].y) * clampedSpeed;

            ch.style.left = (charPositions[i].x - 36) + 'px';
            ch.style.top = charPositions[i].y + 'px';

            // 색상 변화
            const hue = (time * 50 + i * 25) % 360;
            ch.style.color = `hsl(${hue}, 80%, 55%)`;
        });

        // 비
        rainMat.opacity += (rainOpacity - rainMat.opacity) * 0.04;
        const pos = rainGeo.attributes.position.array;
        for (let i = 0; i < rainCount; i++) {
            pos[i * 3 + 1] -= rainVelocities[i];
            if (pos[i * 3 + 1] < -5) {
                pos[i * 3 + 1] = 10;
                pos[i * 3] = (Math.random() - 0.5) * 20;
            }
        }
        rainGeo.attributes.position.needsUpdate = true;

        renderer.render(scene, camera);
    }
    animate();
    </script>
</body>
</html>
