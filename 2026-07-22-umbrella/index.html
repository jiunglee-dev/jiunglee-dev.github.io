<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우산을 가지고 온 날은 왜 하필 비가 안올까?</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            transition: background 1.5s ease;
            background: #1a1a2e;
            cursor: pointer;
        }

        body.sunny {
            background: #87CEEB;
        }

        /* 비 캔버스 */
        #rain-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
            transition: opacity 1s ease;
        }

        body.sunny #rain-canvas {
            opacity: 0;
        }

        /* 어두운 오버레이 (비올 때) */
        .dark-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            z-index: 1;
            transition: opacity 1.5s ease;
        }

        body.sunny .dark-overlay {
            opacity: 0;
        }

        /* 우산 */
        .umbrella-wrapper {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 5;
            cursor: pointer;
        }

        .umbrella {
            position: relative;
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* 접힌 우산 */
        .umbrella-closed {
            width: 8px;
            height: 200px;
            background: #333;
            border-radius: 4px;
            position: relative;
            margin: 0 auto;
        }

        .umbrella-closed .tip {
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 20px;
            border: 4px solid #333;
            border-radius: 50%;
            border-top: none;
        }

        .umbrella-closed .top {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 16px;
            height: 16px;
            background: #c0392b;
            border-radius: 50%;
        }

        /* 펼친 우산 */
        .umbrella-open {
            display: none;
            text-align: center;
        }

        .umbrella-open .canopy {
            width: 200px;
            height: 100px;
            background: #c0392b;
            border-radius: 200px 200px 0 0;
            position: relative;
            margin: 0 auto;
            overflow: hidden;
        }

        .umbrella-open .canopy::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-conic-gradient(
                #c0392b 0deg 45deg,
                #a93226 45deg 90deg
            );
            border-radius: 200px 200px 0 0;
            opacity: 0.5;
        }

        .umbrella-open .stick {
            width: 6px;
            height: 140px;
            background: #333;
            margin: 0 auto;
            border-radius: 3px;
        }

        .umbrella-open .hook {
            width: 24px;
            height: 24px;
            border: 5px solid #333;
            border-radius: 50%;
            border-top: none;
            border-left: none;
            margin: -5px auto 0;
            transform: rotate(45deg);
        }

        body.sunny .umbrella-open {
            display: block;
            animation: umbrella-pop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        body.sunny .umbrella-closed {
            display: none;
        }

        @keyframes umbrella-pop {
            0% { transform: scale(0.3) rotate(-10deg); opacity: 0; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        /* 태양 — 텔레토비 스타일 */
        .sun {
            position: fixed;
            top: -200px;
            right: 10%;
            width: 200px;
            height: 200px;
            z-index: 3;
            transition: top 1.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        body.sunny .sun {
            top: 30px;
        }

        .sun-body {
            width: 200px;
            height: 200px;
            background: radial-gradient(circle at 40% 40%, #FFE066, #FFB800);
            border-radius: 50%;
            position: relative;
            animation: sun-rotate 8s linear infinite;
            box-shadow: 0 0 60px rgba(255, 200, 0, 0.6);
        }

        @keyframes sun-rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 태양 얼굴 — 회전 반대로 해서 얼굴은 고정 */
        .sun-face {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            animation: sun-face-fix 8s linear infinite;
        }

        @keyframes sun-face-fix {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(-360deg); }
        }

        .sun-face .eye {
            position: absolute;
            top: 65px;
            width: 24px;
            height: 30px;
            background: #1a1a1a;
            border-radius: 50%;
        }

        .sun-face .eye.left { left: 55px; }
        .sun-face .eye.right { right: 55px; }

        .sun-face .eye::after {
            content: '';
            position: absolute;
            top: 6px;
            left: 6px;
            width: 10px;
            height: 10px;
            background: white;
            border-radius: 50%;
        }

        .sun-face .nose {
            position: absolute;
            top: 90px;
            left: 50%;
            transform: translateX(-50%);
            width: 14px;
            height: 14px;
            background: #E8960C;
            border-radius: 50%;
        }

        .sun-face .mouth {
            position: absolute;
            top: 110px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 30px;
            border-bottom: 6px solid #1a1a1a;
            border-radius: 0 0 60px 60px;
        }

        /* 광선 */
        .sun-rays {
            position: absolute;
            top: -30px;
            left: -30px;
            width: 260px;
            height: 260px;
        }

        .ray {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 4px;
            height: 40px;
            background: #FFB800;
            transform-origin: center bottom;
            border-radius: 2px;
        }

        /* 안내 텍스트 */
        .hint {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
            z-index: 10;
            transition: opacity 1s ease;
            letter-spacing: 1px;
        }

        body.sunny .hint {
            opacity: 0;
        }
    </style>
</head>
<body>
    <canvas id="rain-canvas"></canvas>
    <div class="dark-overlay"></div>

    <!-- 태양 -->
    <div class="sun">
        <div class="sun-body">
            <div class="sun-rays"></div>
            <div class="sun-face">
                <div class="eye left"></div>
                <div class="eye right"></div>
                <div class="nose"></div>
                <div class="mouth"></div>
            </div>
        </div>
    </div>

    <!-- 우산 -->
    <div class="umbrella-wrapper" id="umbrella-trigger">
        <div class="umbrella">
            <div class="umbrella-closed">
                <div class="top"></div>
                <div class="tip"></div>
            </div>
            <div class="umbrella-open">
                <div class="canopy"></div>
                <div class="stick"></div>
                <div class="hook"></div>
            </div>
        </div>
    </div>

    <div class="hint">우산을 클릭해보세요</div>

    <script>
        // === 비 애니메이션 ===
        const canvas = document.getElementById('rain-canvas');
        const ctx = canvas.getContext('2d');
        let w = canvas.width = window.innerWidth;
        let h = canvas.height = window.innerHeight;
        let isRaining = true;

        window.addEventListener('resize', () => {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
        });

        // 빗방울
        class Raindrop {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * w;
                this.y = Math.random() * -h;
                this.speed = Math.random() * 15 + 10;
                this.length = Math.random() * 25 + 15;
                this.opacity = Math.random() * 0.4 + 0.2;
            }
            update() {
                this.y += this.speed;
                if (this.y > h) this.reset();
            }
            draw() {
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(this.x + 1, this.y + this.length);
                ctx.strokeStyle = `rgba(174, 194, 224, ${this.opacity})`;
                ctx.lineWidth = 1.5;
                ctx.stroke();
            }
        }

        const drops = Array.from({ length: 200 }, () => new Raindrop());

        function animateRain() {
            if (!isRaining) {
                ctx.clearRect(0, 0, w, h);
                requestAnimationFrame(animateRain);
                return;
            }
            ctx.clearRect(0, 0, w, h);
            for (const drop of drops) {
                drop.update();
                drop.draw();
            }
            requestAnimationFrame(animateRain);
        }
        animateRain();

        // === 태양 광선 생성 ===
        const raysContainer = document.querySelector('.sun-rays');
        for (let i = 0; i < 12; i++) {
            const ray = document.createElement('div');
            ray.classList.add('ray');
            ray.style.transform = `rotate(${i * 30}deg) translateY(-130px)`;
            raysContainer.appendChild(ray);
        }

        // === 우산 클릭 인터랙션 ===
        const trigger = document.getElementById('umbrella-trigger');
        let opened = false;

        trigger.addEventListener('click', (e) => {
            e.stopPropagation();
            if (opened) return;
            opened = true;
            isRaining = false;
            document.body.classList.add('sunny');
        });

        // 바디 클릭으로 리셋 (우산 외 영역)
        document.body.addEventListener('click', () => {
            if (!opened) return;
            opened = false;
            isRaining = true;
            document.body.classList.remove('sunny');
        });
    </script>
</body>
</html>
