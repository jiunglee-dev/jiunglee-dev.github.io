<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jiunglee-dev</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #0a0a0a;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        .container {
            position: relative;
            perspective: 1000px;
        }

        .card {
            position: relative;
            width: 368px;
            height: 520px;
            border-radius: 20px;
            overflow: hidden;
            transition: transform 0.1s ease-out, box-shadow 0.3s ease;
            cursor: pointer;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .card:hover {
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.8),
                        0 0 60px rgba(100, 180, 255, 0.15);
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .card:hover img {
            transform: scale(1.05);
        }

        .card .shine {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(
                circle at var(--x, 50%) var(--y, 50%),
                rgba(255, 255, 255, 0.12) 0%,
                transparent 60%
            );
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .card:hover .shine {
            opacity: 1;
        }

        /* 연기 캔버스 */
        #smoke-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        /* 하단 텍스트 */
        .credit {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.3);
            font-size: 13px;
            letter-spacing: 2px;
            text-transform: uppercase;
            z-index: 1;
        }
    </style>
</head>
<body>
    <canvas id="smoke-canvas"></canvas>

    <div class="container">
        <div class="card" id="card">
            <img src="image.jpg" alt="artwork">
            <div class="shine" id="shine"></div>
        </div>
    </div>

    <div class="credit">jiunglee-dev</div>

    <script>
        // === 담배연기 파티클 시스템 ===
        const canvas = document.getElementById('smoke-canvas');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        let mouseX = width / 2;
        let mouseY = height / 2;
        let prevMouseX = mouseX;
        let prevMouseY = mouseY;

        document.addEventListener('mousemove', (e) => {
            prevMouseX = mouseX;
            prevMouseY = mouseY;
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        // 연기 파티클 클래스
        class SmokeParticle {
            constructor(x, y, vx, vy) {
                this.x = x;
                this.y = y;
                // 위로 올라가는 속도 + 마우스 이동 방향의 관성
                this.vx = vx * 0.3 + (Math.random() - 0.5) * 0.8;
                this.vy = vy * 0.3 - (Math.random() * 1.5 + 0.5);
                this.life = 1.0;
                this.decay = Math.random() * 0.015 + 0.008;
                this.size = Math.random() * 20 + 10;
                this.growRate = Math.random() * 0.8 + 0.3;
                // 연기 색상 — 약간 따뜻한 회색
                this.hue = Math.random() * 20 + 20;
                this.saturation = Math.random() * 5 + 3;
                this.lightness = Math.random() * 20 + 60;
                // 흔들림
                this.wobble = Math.random() * Math.PI * 2;
                this.wobbleSpeed = Math.random() * 0.03 + 0.01;
                this.wobbleAmount = Math.random() * 1.5 + 0.5;
            }

            update() {
                this.wobble += this.wobbleSpeed;
                this.x += this.vx + Math.sin(this.wobble) * this.wobbleAmount;
                this.y += this.vy;
                this.vx *= 0.98;
                this.vy *= 0.99;
                this.size += this.growRate;
                this.life -= this.decay;
            }

            draw(ctx) {
                if (this.life <= 0) return;
                const alpha = this.life * 0.4;
                ctx.save();
                ctx.globalAlpha = alpha;
                ctx.filter = `blur(${this.size * 0.3}px)`;

                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.size
                );
                gradient.addColorStop(0, `hsla(${this.hue}, ${this.saturation}%, ${this.lightness}%, 0.6)`);
                gradient.addColorStop(0.4, `hsla(${this.hue}, ${this.saturation}%, ${this.lightness}%, 0.3)`);
                gradient.addColorStop(1, `hsla(${this.hue}, ${this.saturation}%, ${this.lightness}%, 0)`);

                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        let particles = [];
        let frameCount = 0;

        function animate() {
            requestAnimationFrame(animate);
            ctx.clearRect(0, 0, width, height);

            frameCount++;

            // 마우스 이동 속도 계산
            const dx = mouseX - prevMouseX;
            const dy = mouseY - prevMouseY;
            const speed = Math.sqrt(dx * dx + dy * dy);

            // 매 프레임 연기 파티클 생성 (이동 중일 때 더 많이)
            const count = Math.min(Math.floor(speed * 0.3) + 1, 5);
            for (let i = 0; i < count; i++) {
                const offsetX = (Math.random() - 0.5) * 8;
                const offsetY = (Math.random() - 0.5) * 8;
                particles.push(new SmokeParticle(
                    mouseX + offsetX,
                    mouseY + offsetY,
                    dx * 0.05,
                    dy * 0.05
                ));
            }

            // 파티클 업데이트 & 렌더
            particles = particles.filter(p => p.life > 0);
            for (const p of particles) {
                p.update();
                p.draw(ctx);
            }

            // 성능 제한 — 최대 200개
            if (particles.length > 200) {
                particles = particles.slice(-200);
            }
        }

        animate();

        // === 카드 3D 틸트 효과 ===
        const card = document.getElementById('card');
        const shine = document.getElementById('shine');

        card.addEventListener('mousemove', (e) => {
            const rect = card.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            const centerX = rect.width / 2;
            const centerY = rect.height / 2;

            const rotateX = (y - centerY) / 15;
            const rotateY = (centerX - x) / 15;

            card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;

            const percentX = (x / rect.width) * 100;
            const percentY = (y / rect.height) * 100;
            shine.style.setProperty('--x', percentX + '%');
            shine.style.setProperty('--y', percentY + '%');
        });

        card.addEventListener('mouseleave', () => {
            card.style.transform = 'rotateX(0deg) rotateY(0deg)';
        });

        // 클릭 펄스
        card.addEventListener('click', () => {
            card.style.transition = 'transform 0.3s ease';
            card.style.transform = 'scale(0.95)';
            setTimeout(() => {
                card.style.transform = 'scale(1)';
                setTimeout(() => {
                    card.style.transition = 'transform 0.1s ease-out';
                }, 300);
            }, 150);
        });
    </script>
</body>
</html>
